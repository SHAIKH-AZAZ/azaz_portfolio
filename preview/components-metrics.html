<!doctype html>
<html><head><meta charset="utf-8"><title>Metric card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);font-family:var(--font-body)}
  .wrap{padding:22px 24px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .m{padding:1.3rem;border-radius:16px;background:#fff;border:1px solid var(--line);box-shadow:0 4px 24px rgba(0,0,0,.07),0 1px 4px rgba(0,0,0,.04);min-height:120px}
  .v{display:block;font-family:var(--font-display);font-size:2.4rem;font-weight:800;line-height:1;letter-spacing:-.02em;color:#6366f1}
  .l{display:block;margin-top:.45rem;color:var(--fg2);font-size:.82rem;line-height:1.5}
</style></head>
<body><div class="wrap">
  <article class="m"><span class="v">1+</span><span class="l">Year of full-stack engineering experience</span></article>
  <article class="m"><span class="v">15+</span><span class="l">Business operations optimized through code</span></article>
  <article class="m"><span class="v">98%</span><span class="l">Performance &amp; efficiency increase on core systems</span></article>
</div></body></html>
