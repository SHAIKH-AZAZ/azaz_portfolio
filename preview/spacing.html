<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);font-family:var(--font-body)}
  .wrap{padding:22px 24px}
  .row{display:flex;align-items:flex-end;gap:18px;margin-bottom:12px}
  .bar{background:linear-gradient(180deg,#6366f1,#818cf8);border-radius:4px;width:28px}
  .cell{text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px}
  .name{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.06em;color:var(--fg1);font-weight:700}
  .val{color:var(--fg2);font-family:var(--font-mono);font-size:9.5px}
  .note{color:var(--fg2);font-size:11px;line-height:1.55;margin-top:6px;max-width:70ch}
  .label{font-family:var(--font-mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:10px}
</style></head>
<body><div class="wrap">
  <div class="label">Spacing scale · base 4px · multiples of 0.25rem</div>
  <div class="row">
    <div class="cell"><div class="bar" style="height:6px"></div><div class="name">1</div><div class="val">4px</div></div>
    <div class="cell"><div class="bar" style="height:10px"></div><div class="name">2</div><div class="val">8px</div></div>
    <div class="cell"><div class="bar" style="height:16px"></div><div class="name">3</div><div class="val">12px</div></div>
    <div class="cell"><div class="bar" style="height:22px"></div><div class="name">4</div><div class="val">16px</div></div>
    <div class="cell"><div class="bar" style="height:30px"></div><div class="name">5</div><div class="val">20px</div></div>
    <div class="cell"><div class="bar" style="height:36px"></div><div class="name">6</div><div class="val">24px</div></div>
    <div class="cell"><div class="bar" style="height:50px"></div><div class="name">8</div><div class="val">32px</div></div>
    <div class="cell"><div class="bar" style="height:62px"></div><div class="name">10</div><div class="val">40px</div></div>
    <div class="cell"><div class="bar" style="height:76px"></div><div class="name">12</div><div class="val">48px</div></div>
  </div>
  <div class="note">Cards use 1.8rem (28.8px) interior padding; sections are 6rem tall; container is min(1120px, 100% − 2rem).</div>
</div></body></html>
