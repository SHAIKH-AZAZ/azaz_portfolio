<!doctype html>
<html><head><meta charset="utf-8"><title>Colors — Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);font-family:var(--font-body)}
  .wrap{padding:20px 24px;display:flex;flex-direction:column;gap:14px}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .sw{border-radius:var(--radius-lg);border:1px solid var(--line);background:#fff;overflow:hidden;box-shadow:var(--shadow)}
  .chip{height:82px}
  .chip.ring{box-shadow:inset 0 0 0 1px rgba(0,0,0,.08)}
  .meta{padding:10px 12px;font-size:12px;line-height:1.35}
  .name{font-family:var(--font-mono);font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--fg1);font-size:10px}
  .hex{color:var(--fg2);font-family:var(--font-mono);font-size:11px;margin-top:3px}
  .label{font-family:var(--font-mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);font-weight:700}
</style></head>
<body><div class="wrap">
  <div class="label">Neutrals · surfaces · foreground</div>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#f8f9fc"></div><div class="meta"><div class="name">Bg</div><div class="hex">#F8F9FC · page</div></div></div>
    <div class="sw"><div class="chip ring" style="background:#ffffff"></div><div class="meta"><div class="name">Bg elevated</div><div class="hex">#FFFFFF · card</div></div></div>
    <div class="sw"><div class="chip" style="background:#6b7280"></div><div class="meta"><div class="name">Fg2</div><div class="hex">#6B7280 · muted</div></div></div>
    <div class="sw"><div class="chip" style="background:#0f1117"></div><div class="meta"><div class="name">Fg1</div><div class="hex">#0F1117 · text</div></div></div>
  </div>
</div></body></html>
