<!doctype html>
<html><head><meta charset="utf-8"><title>Type — Mono</title>
<link rel="stylesheet" href="retro.css">
<style>
  .grid{display:flex;flex-direction:column;gap:10px}
  .row{display:grid;grid-template-columns:120px 1fr;gap:14px;align-items:center}
  .tag{padding-right:10px;border-right:2px dashed rgba(42,36,22,.35);padding-top:2px;padding-bottom:2px}
  .sample{font-family:var(--mono);color:var(--ink);margin:0}
  .eyebrow{font-weight:700;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent)}
  .caption{font-weight:700;font-size:12.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-2)}
  .number{font-family:var(--disp);font-size:32px;line-height:1;letter-spacing:.04em;display:inline-block;padding:0 6px;border:2px solid var(--ink);background:var(--paper);box-shadow:3px 3px 0 var(--ink);margin-right:8px;color:var(--ink)}
  .number.a{color:var(--accent)}
  .number.b{color:#1f5d4a}
  .chip{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--ink);background:var(--paper);border:2px solid var(--ink);padding:4px 10px;box-shadow:2px 2px 0 var(--ink);margin-right:8px}
  .chip::before{content:"";width:6px;height:6px;background:var(--accent);border:1px solid var(--ink);display:inline-block}
  .spec{margin-top:8px;border-top:1px dotted rgba(42,36,22,.35);padding-top:6px}
</style></head>
<body><div class="retro-wrap">
  <div class="retro-header">
    <div>
      <div class="retro-key">&gt;&gt; Tokens / typography · mono</div>
      <div class="retro-title">Mono &amp; Labels</div>
    </div>
    <div class="retro-stamp">REV · 01</div>
  </div>
  <div class="retro-card">
    <div class="grid">
      <div class="row"><div class="retro-tag tag">Eyebrow</div><p class="sample eyebrow">Featured Work / Full-Stack Systems</p></div>
      <div class="row"><div class="retro-tag tag">Caption</div><p class="sample caption">Workflows · Automated</p></div>
      <div class="row"><div class="retro-tag tag">Project №</div><div><span class="number">01</span><span class="number a">02</span><span class="number b">03</span></div></div>
      <div class="row"><div class="retro-tag tag">Step chip</div><div><span class="chip">01 · Discovery</span><span class="chip">02 · Build</span></div></div>
    </div>
    <div class="spec retro-spec">IBM Plex Mono 700 · VT323 · tracking 0.16–0.22em · uppercase</div>
  </div>
  <div class="retro-ticker"><span>System · mono</span><span>4 styles</span><span>Azaz.dev</span></div>
</div></body></html>
