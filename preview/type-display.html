<!doctype html>
<html><head><meta charset="utf-8"><title>Type — Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);font-family:var(--font-body)}
  .wrap{padding:20px 24px;display:flex;flex-direction:column;gap:14px}
  .row{display:flex;align-items:baseline;gap:16px}
  .tag{font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:700;min-width:96px}
  .spec{color:var(--fg2);font-family:var(--font-mono);font-size:10px}
  .h1{font-family:var(--font-display);font-size:44px;font-weight:800;line-height:.94;letter-spacing:-.05em;color:var(--fg1);margin:0}
  .h2{font-family:var(--font-display);font-size:30px;font-weight:800;line-height:1.06;letter-spacing:-.04em;color:var(--fg1);margin:0}
  .h3{font-family:var(--font-display);font-size:20px;font-weight:700;letter-spacing:-.025em;color:var(--fg1);margin:0}
</style></head>
<body><div class="wrap">
  <div class="row"><span class="tag">Hero H1</span><span class="h1">Software that moves faster.</span></div>
  <div class="spec" style="margin-left:112px;margin-top:-6px">Bricolage Grotesque · 800 · clamp(2.85rem, 4.45vw, 4.35rem) · -0.05em</div>
  <div class="row"><span class="tag">Section H2</span><span class="h2">I engineer software solutions</span></div>
  <div class="spec" style="margin-left:112px;margin-top:-6px">Bricolage Grotesque · 800 · clamp(2rem, 3.2vw, 3rem) · -0.04em</div>
  <div class="row"><span class="tag">Card H3</span><span class="h3">Operational Efficiency</span></div>
  <div class="spec" style="margin-left:112px;margin-top:-6px">Bricolage Grotesque · 700 · 1.15–1.3rem · -0.025em</div>
</div></body></html>
